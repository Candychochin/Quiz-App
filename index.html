<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz App</title>

    <link rel="stylesheet" href="./css/style.css" />
  </head>

  <body>
    
    <header>
      <nav>
        <ul>
          <li id="nav-start-btn">Start Quiz</li>
          <li id="nav-create-btn">Make Questions</li>
          <li id="nav-check-btn">Check Questions</li>
        </ul>
      </nav>
    </header>

    <div class="page-wrapper">

      <div class="delete-popup-container hidden">
        <section class="delete-popup">
          <h2>
            Are You Sure? <br />
            Want To <span>Delete</span> This Question?
          </h2>

          <button class="confirmNo">No</button>
          <button class="confirmDel">Yes</button>
        </section>
      </div>

      <main>

        <section class="start-container active">
          <h1>Welcome To Quiz App</h1>
          <p>Click The Start Quiz to start the test.</p>
          <button id="start-btn">Start Quiz</button>
          <button id="create-btn">Make Question Yourself</button>
        </section>

        <section class="create-container hidden">
          <div class="create-question-container">
            <label for="create-question">Enter A Question</label>
            <input
              type="text"
              id="create-question"
              placeholder="Enter A Question"
              required
            />
          </div>
          <p>
            Enter An Answer And <br />
            Check The Correct Answer
          </p>
          <div class="create-answers-container">
            <div class="answer-pairs">

              <label for="create-answer1">1.</label>
              <input
                type="text"
                id="create-answer1"
                placeholder="Enter An Answer"
                required
              />

              <input type="radio" name="create-correct" value="true" id="create-correct1" required/>
              <label for="create-correct1">correct</label>
            
            </div>
            <div class="answer-pairs">
            
              <label for="create-answer2">2.</label>
              <input
                type="text"
                id="create-answer2"
                placeholder="Enter An Answer"
                required
              />
            
              <input type="radio" name="create-correct" value="true" id="create-correct2" required />
              <label for="create-correct2">correct</label>
            
            </div>
            <div class="answer-pairs">
            
              <label for="create-answer3">3.</label>
              <input
                type="text"
                id="create-answer3"
                placeholder="Enter An Answer"
                required
              />
            
              <input type="radio" name="create-correct" value="true" id="create-correct3" required />
              <label for="create-correct3">correct</label>
            
            </div>
           
          </div>

          <button id="submit-btn">Add This Question</button>
        </section>

        <section class="question-look-container hidden">
          <h2>Your Questions</h2>

          <div class="border-container" id="question-list">
          </div>

        </section>

        <section class="edit-container hidden">
          <h2>Edit Your Question</h2>
          <div class="edit-question-container">
            
            <input type="text" name="editQuestion" id="editQuestion"></input>

            <div class="edit-answers-container">
              <div class="answer-pairs">
                <label for="editAnswer1">1.</label>
                
                <input type="text" name="editAnswer1" id="editAnswer1" required></input>
                <input
                  type="radio"
                  name="editCorrect"
                  value="true"
                  id="editCorrect1"
                />
                <label for="editCorrect1">correct</label>
              </div>
              <div class="answer-pairs">
                <label for="editAnswer2">2.</label>
                
                <input type="text" name="editAnswer2" id="editAnswer2" required></input>
                <input
                  type="radio"
                  name="editCorrect"
                  value="true"
                  id="editCorrect2"
                />
                <label for="editCorrect2">correct</label>
              </div>
              <div class="answer-pairs">
                <label for="editAnswer3">3.</label>
                
                <input type="text" name="editAnswer3" id="editAnswer3" required></input>

                <input
                  type="radio"
                  name="editCorrect"
                  value="true"
                  id="editCorrect3"
                />
                <label for="editCorrect3">correct</label>
              </div>
              
              <button id="edit-confirm-btn" class="edit-confirm">Confirm Edit?</button>

            </div>
          </div>
        </section>

        <section class="quiz-container hidden">
          <h2 id="progressNum">0 / 0</h2>
          <h2 id="question">Question</h2>
          <div class="answers-container">
            <div class="answers">
              <label for="one" id="answerOne">
                <input type="radio" name="answer" id="one" />

                <span>Answer Option</span>
              </label>
            </div>
            <div class="answers">
              <label for="two" id="answerTwo">
                <input type="radio" name="answer" id="two" />

                <span>Answer Option</span>
              </label>
            </div>

            <div class="answers">
              <label for="three" id="answerThree">
                <input type="radio" name="answer" id="three" />

                <span>Answer Option</span>
              </label>
            </div>

           

            <button id="select-btn">Select The Answer</button>
          </div>
          <div class="progress-container">
            <div id="progress-bar"></div>
          </div>
        </section>

        <section class="result-container hidden">
          <div class="result-content">
            <h2 id="result-congrats">Congrats Letter</h2>
            <h3 id="result-score">Scores</h3>
            <h3 id="result-advice">Advice</h3>
          </div>
          <button id="restart-btn">Restart The Test</button>
        </section>

      </main>
    </div>

    <script src="./data/questions.js"></script>
    <script src="./js/createQuestion.js"></script>
    <script src="./js/checkQuestion.js"></script>
    
    <script src="./js/main.js"></script>
    <script src="./js/quiz.js"></script>
    <script src="./js/questionManager.js"></script>
  </body>
</html>
